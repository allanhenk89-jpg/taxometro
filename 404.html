<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada - Taxômetro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0b0d0c;
      color: #f0f2f1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 72px;
      font-weight: 800;
      color: #1fcc8a;
      margin-bottom: 16px;
    }
    h2 {
      font-size: 24px;
      margin-bottom: 16px;
    }
    p {
      color: #6b7570;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      background: #1fcc8a;
      color: #051a10;
      padding: 14px 32px;
      border-radius: 99px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s;
    }
    a:hover { transform: scale(0.96); }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Página não encontrada</h2>
    <p>A página que você está procurando não existe ou foi movida.</p>
    <a href="/">Voltar para o início</a>
  </div>
</body>
</html>
